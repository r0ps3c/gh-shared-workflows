name: Docker Build, Scan and Push

on:
  workflow_call:
    inputs:
      image-ref:
        description: 'Local Docker image reference produced by make build (e.g. "unbound-network:main")'
        type: string
        required: true
      version-extract-command:
        description: 'Shell command run inside the container that outputs a version string (e.g. "apk info foo | grep ...")'
        type: string
        required: true
      primary_branch:
        description: 'Primary branch name used for tagging (e.g. "main" or "master")'
        type: string
        default: 'main'
      test-command:
        description: 'Shell command(s) to run tests after build and scan (optional, e.g. "make test-structure && make test-integration")'
        type: string
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write  # Required for uploading SARIF results

    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build image
        run: make build

      - name: Security scan with Grype
        id: grype-sarif
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ inputs.image-ref }}
          output-format: sarif
          severity-cutoff: high
          fail-build: true
          only-fixed: true

      - name: Upload Grype results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@87557b9c84dde89fdd9b10e88954ac2f4248e463 # v4.36.1
        if: always() && steps.grype-sarif.outputs.sarif != ''
        with:
          sarif_file: ${{ steps.grype-sarif.outputs.sarif }}

      - name: Run Grype scan summary
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: ${{ inputs.image-ref }}
          output-format: table
          severity-cutoff: medium
          fail-build: false

      - name: Run tests
        if: inputs.test-command != ''
        run: ${{ inputs.test-command }}

      - name: Extract version information
        id: extract-version
        env:
          IMAGE_REF: ${{ inputs.image-ref }}
          VERSION_EXTRACT: ${{ inputs.version-extract-command }}
        run: |
          FULL_VERSION=$(docker run --rm --entrypoint sh "$IMAGE_REF" -c "$VERSION_EXTRACT")
          MAJOR_VERSION=$(echo "$FULL_VERSION" | cut -d. -f1)

          echo "full_version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "major_version=$MAJOR_VERSION" >> $GITHUB_OUTPUT
          echo "Version: $FULL_VERSION (major: $MAJOR_VERSION)"

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check stable tag compatibility
        id: check-stable
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', inputs.primary_branch)
        env:
          VERSION_EXTRACT: ${{ inputs.version-extract-command }}
        run: |
          IMAGE_BASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          MAIN_MAJOR="${{ steps.extract-version.outputs.major_version }}"

          if docker pull "${IMAGE_BASE}:stable" 2>/dev/null; then
            STABLE_VERSION=$(docker run --rm --entrypoint sh "${IMAGE_BASE}:stable" -c "$VERSION_EXTRACT")
            STABLE_MAJOR=$(echo "$STABLE_VERSION" | cut -d. -f1)

            echo "Main major version: $MAIN_MAJOR"
            echo "Stable major version: $STABLE_MAJOR"

            if [ "$MAIN_MAJOR" == "$STABLE_MAJOR" ]; then
              echo "safe_to_update=true" >> $GITHUB_OUTPUT
              echo "✓ Safe to update stable tag (same major version)"
            else
              echo "safe_to_update=false" >> $GITHUB_OUTPUT
              echo "✗ Not safe to update stable tag (major version changed: $STABLE_MAJOR -> $MAIN_MAJOR)"
            fi
          else
            echo "safe_to_update=true" >> $GITHUB_OUTPUT
            echo "✓ No existing stable tag, safe to create"
          fi

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        if: github.event_name != 'pull_request'
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=main,enable=${{ github.ref == format('refs/heads/{0}', inputs.primary_branch) }}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', inputs.primary_branch) }}
            type=raw,value=${{ steps.extract-version.outputs.full_version }},enable=true
            type=raw,value=${{ steps.extract-version.outputs.major_version }},enable=${{ github.ref == format('refs/heads/{0}', inputs.primary_branch) }}
            type=raw,value=stable,enable=${{ github.ref == format('refs/heads/{0}', inputs.primary_branch) && steps.check-stable.outputs.safe_to_update == 'true' }}
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/stable' }}

      - name: Build and push Docker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: github.event_name != 'pull_request'
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.extract-version.outputs.full_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Major Version:** ${{ steps.extract-version.outputs.major_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Tags Pushed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
